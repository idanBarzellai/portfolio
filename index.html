<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Portfolio Hub</title>
    <meta
      name="description"
      content="A swipe-first portfolio hub with modular sections and a reels-style project view."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <p class="eyebrow">Portfolio Hub</p>
        <h1 id="section-title">About</h1>
        <button type="button" id="header-home-btn" class="home-btn is-hidden" aria-label="Go to home section" title="Home">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3.2 3.8 10a1 1 0 0 0-.36.77V20a1 1 0 0 0 1 1h5.14a1 1 0 0 0 1-1v-4.46h2.84V20a1 1 0 0 0 1 1h5.14a1 1 0 0 0 1-1v-9.23a1 1 0 0 0-.36-.77L12 3.2z" />
          </svg>
        </button>
      </header>

      <main id="section-host" aria-live="polite"></main>

      <footer class="hint-bar">
        <div class="hint-item">
          <button type="button" class="hint-btn" data-dir="up" aria-label="Go to Skills">↑</button>
          <span class="hint-label">Skills</span>
        </div>
        <div class="hint-item">
          <button type="button" class="hint-btn" data-dir="right" aria-label="Go to Projects">→</button>
          <span class="hint-label">Projects</span>
        </div>
        <div class="hint-item">
          <button type="button" class="hint-btn" data-dir="left" aria-label="Go to Work Experience">←</button>
          <span class="hint-label">Work Experience</span>
        </div>
        <div class="hint-item">
          <button type="button" class="hint-btn" data-dir="down" aria-label="Go to Academic Experience">↓</button>
          <span class="hint-label">Academic Experience</span>
        </div>
      </footer>
    </div>

    <script src="./src/app.js"></script>
  </body>
</html>
