<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Hub</title>
    <meta
      name="description"
      content="A swipe-first portfolio hub with modular sections and a reels-style project view."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <p class="eyebrow">Portfolio Hub</p>
        <h1 id="section-title">About</h1>
      </header>

      <main id="section-host" aria-live="polite"></main>

      <footer class="hint-bar">
        <button type="button" class="hint-btn" data-dir="up" aria-label="Go to section above">↑</button>
        <div class="hint-center">Swipe or use arrows</div>
        <button type="button" class="hint-btn" data-dir="right" aria-label="Go to section right">→</button>
        <button type="button" class="hint-btn" data-dir="left" aria-label="Go to section left">←</button>
        <button type="button" class="hint-btn" data-dir="down" aria-label="Go to section below">↓</button>
      </footer>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
