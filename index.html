<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idan Portfolio Game</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --line: #334155;
        --text: #e2e8f0;
        --accent: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #1e293b 0%, #0b1120 70%);
      }

      .layout {
        max-width: 1400px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 14px;
      }

      .canvas-wrap {
        position: relative;
        border: 1px solid var(--line);
        background: #020617;
        border-radius: 10px;
        overflow: hidden;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: min(78vh, 740px);
      }

      .hud {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.85);
        padding: 12px;
      }

      .hud h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .hud p {
        margin: 7px 0;
        font-size: 14px;
        color: #cbd5e1;
      }

      .slider-row {
        margin-top: 10px;
      }

      .slider-row label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .slider-row input {
        width: 100%;
      }

      #mobile-controls {
        display: none;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .hud {
          order: 2;
        }

        #mobile-controls {
          position: absolute;
          left: 0;
          right: 0;
          bottom: 0;
          padding: 12px;
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
          pointer-events: none;
        }

        #mobile-joystick,
        #mobile-jump {
          pointer-events: auto;
        }

        #mobile-joystick {
          width: 92px;
          height: 92px;
          border-radius: 50%;
          background: rgba(15, 23, 42, 0.66);
          border: 1px solid rgba(148, 163, 184, 0.35);
          position: relative;
          touch-action: none;
        }

        #mobile-joystick-thumb {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: rgba(56, 189, 248, 0.7);
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
        }

        #mobile-jump {
          width: 74px;
          height: 74px;
          border-radius: 50%;
          border: 1px solid rgba(148, 163, 184, 0.35);
          background: rgba(15, 23, 42, 0.78);
          color: #fff;
          font-weight: 700;
          font-size: 14px;
          touch-action: none;
        }

        #mobile-jump.pressed {
          background: rgba(56, 189, 248, 0.85);
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <div id="mobile-controls">
          <div id="mobile-joystick">
            <div id="mobile-joystick-thumb"></div>
          </div>
          <button id="mobile-jump" type="button">JUMP</button>
        </div>
      </div>

      <aside class="hud">
        <h2>Debug</h2>
        <p id="debug-position">X: 0 Y: 0</p>
        <p id="debug-velocity">VY: 0</p>
        <p id="debug-grounded">Grounded: false</p>
        <p id="debug-ladder">On Ladder: false</p>
        <p id="debug-scene">Scene: main</p>

        <div class="slider-row">
          <label for="slider-jump">Jump Power: <span id="slider-jump-value">0</span></label>
          <input id="slider-jump" type="range" min="6" max="25" step="0.5" />
        </div>

        <div class="slider-row">
          <label for="slider-move">Move Speed: <span id="slider-move-value">0</span></label>
          <input id="slider-move" type="range" min="2" max="12" step="0.5" />
        </div>

        <div class="slider-row">
          <label for="slider-climb">Climb Speed: <span id="slider-climb-value">0</span></label>
          <input id="slider-climb" type="range" min="1" max="8" step="0.25" />
        </div>
      </aside>
    </div>

    <script src="./dist/index.js"></script>
  </body>
</html>
